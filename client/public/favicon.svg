<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Mountain peaks (red foreground) -->
  <polygon points="18,28 32,10 46,28" fill="#991B1B"/>
  <polygon points="24,28 32,16 40,28" fill="#7f1d1d"/>
  <!-- Bus body -->
  <rect x="12" y="26" width="40" height="16" rx="4" fill="#B91C1C"/>
  <!-- Windows -->
  <rect x="15" y="29" width="9" height="7" rx="1.5" fill="#fff" opacity="0.9"/>
  <rect x="27" y="29" width="9" height="7" rx="1.5" fill="#fff" opacity="0.9"/>
  <!-- Headlight -->
  <rect x="48" y="31" width="4" height="4" rx="1" fill="#fbbf24"/>
  <!-- Road curving down -->
  <path d="M20,44 Q32,42 44,44 Q52,47 54,56 L10,56 Q12,47 20,44Z" fill="#374151"/>
  <!-- Road dashes -->
  <line x1="28" y1="45" x2="36" y2="45" stroke="#fff" stroke-width="1.2" stroke-dasharray="3,2"/>
  <path d="M36,48 Q42,50 44,54" stroke="#fff" stroke-width="1" stroke-dasharray="2,2" fill="none"/>
  <!-- Wheels -->
  <circle cx="20" cy="43" r="4" fill="#1f2937"/>
  <circle cx="20" cy="43" r="2" fill="#6b7280"/>
  <circle cx="44" cy="43" r="4" fill="#1f2937"/>
  <circle cx="44" cy="43" r="2" fill="#6b7280"/>
</svg>
